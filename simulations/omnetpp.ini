# =============================================================================
# omnetpp.ini  –  M/M/1/L Finite-Capacity Queue Simulator
# CNG 436 Wireless Communication and Networks
# METU Northern Cyprus Campus
# =============================================================================
#
# Model:    Source (Poisson, rate λ) --> Server (M/M/1/L) --> Sink
# Fixed:    μ = 3 jobs/s,  L = 10 (system capacity)
# Variable: λ ∈ {1, 2, 2.5, 4}  → ρ ∈ {0.333, 0.667, 0.833, 1.333}
#
# Statistics collected (post-warmup):
#   E[W]       waitingTime:mean         (Server signal)
#   E[W|W>0]   waitingTimeGT0:mean      (Server recordScalar)
#   U          utilisation:timeavg      (Server signal)
#   E[Nq]      queueLength:timeavg      (Server signal)
#   λ_eff      lambda:eff               (Server recordScalar)
#   E[T]       responseTime:mean        (Sink signal)
#

[General]
network          = MM1L
ned-path         = ../src
sim-time-limit   = 100000s
warmup-period    = 1000s
repeat           = 1
seed-set         = ${repetition}
result-dir       = results
num-rngs         = 2

**.scalar-recording = true
**.vector-recording = false

rng-class = "cMersenneTwister"

# Fixed system parameters
**.server.capacity = 10      # L: finite system capacity
**.server.mu       = 3.0     # μ: service rate (jobs/s)

# =============================================================================
# CONFIG 1: Light load  ρ = λ/μ = 1/3 ≈ 0.333
# =============================================================================
[Config MM1L_light]
description = "M/M/1/L: lambda=1, mu=3, L=10  (light load, rho=0.333)"
**.source.lambda = 1.0

# =============================================================================
# CONFIG 2: Medium load  ρ = 2/3 ≈ 0.667
# =============================================================================
[Config MM1L_medium]
description = "M/M/1/L: lambda=2, mu=3, L=10  (medium load, rho=0.667)"
**.source.lambda = 2.0

# =============================================================================
# CONFIG 3: Heavy load  ρ = 2.5/3 ≈ 0.833
# =============================================================================
[Config MM1L_heavy]
description = "M/M/1/L: lambda=2.5, mu=3, L=10  (heavy load, rho=0.833)"
**.source.lambda = 2.5

# =============================================================================
# CONFIG 4: Overload  ρ = 4/3 ≈ 1.333
# =============================================================================
[Config MM1L_overload]
description = "M/M/1/L: lambda=4, mu=3, L=10  (overload, rho=1.333)"
**.source.lambda = 4.0
